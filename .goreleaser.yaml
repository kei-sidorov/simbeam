version: 2

project_name: simbeam

builds:
  - id: simbeamd
    main: ./cmd/simbeamd
    binary: simbeamd
    env:
      - CGO_ENABLED=0
    goos: [darwin]
    goarch: [arm64, amd64]
    # Bake the broker so `simbeamd serve` needs no flags. Pairing carries the rest
    # in the URL; no page/Caddy hosting required.
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.defaultSignalURL=wss://signal.simbeam.dev/ws -X main.defaultClientURL=https://app.simbeam.dev/
  # Linux build of the same daemon: runs `simbeamd demo` (headless-browser demo
  # device) on a VPS. Separate build/archive id so the Homebrew cask below keeps
  # picking up only the darwin archives.
  - id: simbeamd-linux
    main: ./cmd/simbeamd
    binary: simbeamd
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.defaultSignalURL=wss://signal.simbeam.dev/ws -X main.defaultClientURL=https://app.simbeam.dev/
  - id: simbeam-signal
    main: ./cmd/simbeam-signal
    binary: simbeam-signal
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: simbeamd
    ids: [simbeamd]
    name_template: "simbeamd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: simbeamd-linux
    ids: [simbeamd-linux]
    name_template: "simbeamd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: simbeam-signal
    ids: [simbeam-signal]
    name_template: "simbeam-signal_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: simbeamd
    ids: [simbeamd]
    repository:
      owner: kei-sidorov
      name: homebrew-simbeam
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/kei-sidorov/simbeam"
    description: "simbeam daemon — stream an iOS simulator from Mac to iPad"
    dependencies:
      # idb-companion is NOT in homebrew-core — it lives in Meta's facebook/fb
      # tap. A bare "idb-companion" only resolves on a machine that already
      # tapped facebook/fb (e.g. the author's), so a fresh Mac saw "No available
      # formula". The owner/tap/formula form makes brew auto-tap it; the caveat
      # below documents the tap as a fallback in case auto-tap misbehaves.
      - formula: facebook/fb/idb-companion
      - formula: ffmpeg
    caveats: |
      simbeamd is shipped as an unsigned binary. The cask's post-install hook
      strips the macOS quarantine attribute so Gatekeeper should not block it.
      simbeamd shells out to idb_companion (simulators) and ffmpeg (h264_videotoolbox).

      idb_companion comes from Meta's tap. If install fails to find it, run:
        brew tap facebook/fb
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/simbeamd"]
          end

release:
  github:
    owner: kei-sidorov
    name: simbeam
