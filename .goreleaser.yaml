version: 2

project_name: simbeam

builds:
  - id: simbeamd
    main: ./cmd/simbeamd
    binary: simbeamd
    env:
      - CGO_ENABLED=0
    goos: [darwin]
    goarch: [arm64, amd64]
    # Bake the broker so `simbeamd serve` needs no flags. Pairing carries the rest
    # in the URL; no page/Caddy hosting required.
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.defaultSignalURL=wss://signal.simbeam.dev/ws -X main.defaultClientURL=https://app.simbeam.dev/ -X main.omitSignalInPairURL=1
  # Linux build of the same daemon: runs `simbeamd demo` (headless-browser demo
  # device) on a VPS. Separate build/archive id so the Homebrew cask below keeps
  # picking up only the darwin archives.
  - id: simbeamd-linux
    main: ./cmd/simbeamd
    binary: simbeamd
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.defaultSignalURL=wss://signal.simbeam.dev/ws -X main.defaultClientURL=https://app.simbeam.dev/ -X main.omitSignalInPairURL=1
  - id: simbeam-signal
    main: ./cmd/simbeam-signal
    binary: simbeam-signal
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: simbeamd
    ids: [simbeamd]
    name_template: "simbeamd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: simbeamd-linux
    ids: [simbeamd-linux]
    name_template: "simbeamd_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: simbeam-signal
    ids: [simbeam-signal]
    name_template: "simbeam-signal_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: simbeamd
    ids: [simbeamd]
    repository:
      owner: kei-sidorov
      name: homebrew-simbeam
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/kei-sidorov/simbeam"
    description: "simbeam daemon — stream an iOS simulator from Mac to iPad"
    dependencies:
      # The Mac media+input path is now our own simbeam-control (native
      # IOSurface → VideoToolbox H.264 + Indigo HID), so idb_companion and
      # ffmpeg are both gone. simbeam-control lives in Formula/simbeam-control.rb
      # in this same tap, which is already tapped by the time this cask installs,
      # so the dependency resolves and installs with no extra `brew tap`. It
      # ships an unsigned universal binary and needs a full Xcode (private
      # CoreSimulator/SimulatorKit). Keep its url/sha256 in sync on bumps.
      - formula: kei-sidorov/simbeam/simbeam-control
    caveats: |
      simbeamd is shipped as an unsigned binary. The cask's post-install hook
      strips the macOS quarantine attribute so Gatekeeper should not block it.
      simbeamd drives simulators through simbeam-control (needs a full Xcode);
      idb_companion and ffmpeg are no longer required.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/simbeamd"]
          end

release:
  github:
    owner: kei-sidorov
    name: simbeam
