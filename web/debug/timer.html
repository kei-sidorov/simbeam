<!DOCTYPE html>
<!-- rAF millisecond timer for the glass-to-glass method
     (docs/research/2026-06-08-latency-pipeline.md, «Методика», п.1): open this
     page in the simulator's Safari, screencapture the simulator window and the
     browser <video> in ONE shot; latency = (timer on sim) − (timer in video). -->
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>timer</title>
<style>
  body { margin: 0; background: #000; color: #0f0; display: flex;
         align-items: center; justify-content: center; height: 100vh;
         font-family: ui-monospace, Menlo, monospace; }
  #t { font-size: 14vw; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="t">0.000</div>
<script>
  const el = document.getElementById('t');
  const t0 = performance.now();
  (function tick() {
    el.textContent = ((performance.now() - t0) / 1000).toFixed(3);
    requestAnimationFrame(tick);
  })();
</script>
</body>
</html>
