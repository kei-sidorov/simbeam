<!DOCTYPE html>
<!-- Wall-clock timer: shows Date.now() modulo 100s as SS.mmm. A decoded frame
     containing these digits can be compared with the frame file's mtime on the
     same machine (sim clock == Mac clock) → capture-to-Mac latency. -->
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>wallclock</title>
<style>
  body { margin: 0; background: #000; color: #0f0; display: flex;
         align-items: center; justify-content: center; height: 100vh;
         font-family: ui-monospace, Menlo, monospace; }
  #t { font-size: 16vw; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div id="t">--.---</div>
<script>
  const el = document.getElementById('t');
  (function tick() {
    el.textContent = ((Date.now() % 100000) / 1000).toFixed(3).padStart(6, '0');
    requestAnimationFrame(tick);
  })();
</script>
</body>
</html>
