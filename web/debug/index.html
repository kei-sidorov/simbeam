<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>simcast debug</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 16px; }
    #sims button { display: block; margin: 4px 0; }
    #modes { margin: 8px 0; }
    #modes button.active { font-weight: bold; text-decoration: underline; }
    .surface { border: 1px solid #ccc; max-height: 80vh; cursor: crosshair; display: none; touch-action: none; }
    #home { margin-top: 8px; display: none; }
    #hint { margin-top: 6px; font-size: 12px; color: #666; display: none; }
  </style>
</head>
<body>
  <div id="modes">
    Mode:
    <button id="modeRtc" class="active">RTC</button>
    <button id="modeJpg">JPG</button>
  </div>
  <div id="identity" style="margin:8px 0; padding:8px; border:1px solid #eee; font-size:13px;">
    <b>Account key:</b> <code id="pubkey">…</code>
    <button id="resetIdentity" title="new account for testing">reset</button>
  </div>
  <div id="startPanel" style="margin:8px 0; padding:8px; border:1px solid #88f; border-radius:4px; font-size:13px;">
    <b>App secret</b> (= server <code>SIMCAST_APP_SECRET</code>):
    <input id="appSecretInput" size="44" placeholder="paste the server's SIMCAST_APP_SECRET" style="font-family:monospace;">
    <button id="startBtn">Start</button>
    <span id="startStatus"></span>
  </div>
  <div id="macs" style="margin:8px 0;">
    <b>My Macs:</b>
    <div id="macList">none yet</div>
    <button id="pairBtn" style="display:none;">Pair this Mac</button>
  </div>
  <div id="subPanel" style="margin:8px 0; padding:8px; border:1px solid #eee; font-size:13px;">
    <b>Subscription (StoreKit emulation):</b>
    <input id="subProduct" value="pro.monthly" size="12">
    expires <input id="subExpires" type="date">
    <button id="subApply">Apply</button>
    <span id="subStatus"></span>
  </div>
  <div id="turnIndicator" style="margin:8px 0; font-size:13px;"></div>
  <h3>Simulators</h3>
  <div id="sims">loading…</div>
  <img id="screenImg" class="surface" alt="simulator">
  <video id="screenVid" class="surface" autoplay playsinline muted></video>
  <div id="hint">Click&nbsp;= tap · drag&nbsp;= swipe · keys typed here go to the device</div>
  <div><button id="home">Home</button></div>

<script>
const simsEl = document.getElementById('sims');
const imgEl = document.getElementById('screenImg');
const vidEl = document.getElementById('screenVid');
const homeBtn = document.getElementById('home');
const hintEl = document.getElementById('hint');
const modeRtcBtn = document.getElementById('modeRtc');
const modeJpgBtn = document.getElementById('modeJpg');

let mode = 'rtc';
let currentUDID = null;
let ws = null;                          // jpg path
let pc = null, dc = null, sig = null;   // rtc path
let startGen = 0;

// ---- 3C: account identity (WebCrypto Ed25519, persisted in localStorage) ----
// App secret — must equal the broker's SIMCAST_APP_SECRET. Entered in the Start
// panel and persisted in localStorage so it survives reloads.
let appSecret = localStorage.getItem('simcast_app_secret') || 'dev-app-secret';
let clientPriv = null;               // CryptoKey (Ed25519 private, usage ['sign'])
let clientPub = null;                // base64 (std) raw public key = account id

function bytesToB64(b) { let s = ''; for (const x of b) s += String.fromCharCode(x); return btoa(s); }

async function loadOrCreateIdentity() {
  const stored = localStorage.getItem('simcast_priv_pkcs8');
  const storedPub = localStorage.getItem('simcast_pub');
  if (stored && storedPub) {
    clientPriv = await crypto.subtle.importKey('pkcs8', b64ToBytes(stored), {name: 'Ed25519'}, true, ['sign']);
    clientPub = storedPub;
    return;
  }
  const kp = await crypto.subtle.generateKey({name: 'Ed25519'}, true, ['sign', 'verify']);
  const pkcs8 = new Uint8Array(await crypto.subtle.exportKey('pkcs8', kp.privateKey));
  const raw = new Uint8Array(await crypto.subtle.exportKey('raw', kp.publicKey));
  clientPriv = kp.privateKey;
  clientPub = bytesToB64(raw);
  localStorage.setItem('simcast_priv_pkcs8', bytesToB64(pkcs8));
  localStorage.setItem('simcast_pub', clientPub);
}

async function signEd25519(bytes) {
  const sig = await crypto.subtle.sign('Ed25519', clientPriv, bytes);
  return bytesToB64(new Uint8Array(sig));
}

async function hmacSha256B64(secret, bytes) {
  const key = await crypto.subtle.importKey('raw', new TextEncoder().encode(secret), {name: 'HMAC', hash: 'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, bytes);
  return bytesToB64(new Uint8Array(sig));
}

// EnrollProof = base64(HMAC-SHA256(S, clientPubKey ‖ 0x00 ‖ nonce)). Bytes must
// match the Go server byte-for-byte.
async function enrollProof(secret, pub, nonce) {
  const enc = new TextEncoder();
  const a = enc.encode(pub), b = enc.encode(nonce);
  const buf = new Uint8Array(a.length + 1 + b.length);
  buf.set(a, 0); buf[a.length] = 0; buf.set(b, a.length + 1);
  return hmacSha256B64(secret, buf);
}

// Canonical subscription bytes: pub ‖ 0x1f ‖ product ‖ 0x1f ‖ expires ‖ 0x1f ‖ issued.
function canonicalSub(pub, product, expires, issued) {
  return new TextEncoder().encode([pub, product, expires, issued].join('\x1f'));
}

function renderIdentity() {
  document.getElementById('pubkey').textContent = clientPub ? clientPub.slice(0, 16) + '…' : '…';
}

document.getElementById('resetIdentity').onclick = async () => {
  localStorage.removeItem('simcast_priv_pkcs8');
  localStorage.removeItem('simcast_pub');
  await loadOrCreateIdentity();
  renderIdentity();
  alert('New account key generated. You must re-pair your Macs.');
};

// ---- 3C: my Macs (saved pinned daemons) ----
function loadMacs() {
  try { return JSON.parse(localStorage.getItem('simcast_macs') || '[]'); } catch (e) { return []; }
}
function saveMac(mac) {
  const macs = loadMacs().filter(m => m.daemon !== mac.daemon);
  macs.push(mac);
  localStorage.setItem('simcast_macs', JSON.stringify(macs));
  renderMacs();
}
function renderMacs() {
  const macs = loadMacs();
  const el = document.getElementById('macList');
  el.innerHTML = '';
  if (!macs.length) { el.textContent = 'none yet'; return; }
  macs.forEach(m => {
    const b = document.createElement('button');
    b.textContent = `${m.name || 'Mac'} (${m.daemon.slice(0, 8)}…)`;
    b.onclick = () => connectRemote(m); // defined in Task 17
    el.appendChild(b);
  });
}

// ---- 3C: subscription emulation + TURN indicator ----
// The broker base URL is derived from the pairing/saved signal WS URL
// (ws://host:9000/ws → http://host:9000).
function brokerHTTPBase() {
  const s = (currentSession && currentSession.signal) || (pairing() && pairing().signal);
  if (!s) return null;
  return s.replace(/^ws/, 'http').replace(/\/ws$/, '');
}

function setupSubscriptionPanel() {
  document.getElementById('subApply').onclick = applySubscription;
}

// setupStartPanel wires the app-secret input + Start button. Start persists the
// secret (used to sign subscription POSTs) and kicks off the session: pair if the
// URL carries a one-time pairing fragment, otherwise reconnect to the last saved Mac.
function setupStartPanel() {
  const input = document.getElementById('appSecretInput');
  const status = document.getElementById('startStatus');
  input.value = appSecret;
  document.getElementById('startBtn').onclick = () => {
    appSecret = input.value.trim();
    localStorage.setItem('simcast_app_secret', appSecret);
    const p = pairing();
    if (p) {
      status.textContent = ' ✓ secret saved — pairing…';
      enroll(p);
    } else {
      const macs = loadMacs();
      if (macs.length) {
        status.textContent = ' ✓ secret saved — connecting to last Mac…';
        connectRemote(macs[macs.length - 1]);
      } else {
        status.textContent = ' ✓ secret saved — open a pairing URL (press P in simcastd) to pair a Mac';
      }
    }
  };
}

// applySubscription sends a REAL signed POST /v1/subscription (replaces StoreKit):
// X-App-Sig = HMAC-SHA256(APP_SECRET, canonical); X-Account-Sig = Ed25519(client).
async function applySubscription() {
  const base = brokerHTTPBase();
  if (!base) { alert('Pair or select a Mac first (need the broker URL).'); return; }
  const product = document.getElementById('subProduct').value;
  const dateVal = document.getElementById('subExpires').value; // yyyy-mm-dd
  if (!dateVal) { alert('pick an expiry date'); return; }
  const expires = new Date(dateVal + 'T00:00:00Z').toISOString().replace(/\.\d{3}Z$/, 'Z');
  const issued = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');

  const canon = canonicalSub(clientPub, product, expires, issued);
  const appSig = await hmacSha256B64(appSecret, canon);
  const accSig = await signEd25519(canon);

  const resp = await fetch(base + '/v1/subscription', {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'X-App-Sig': appSig, 'X-Account-Sig': accSig},
    body: JSON.stringify({client_pubkey: clientPub, product_id: product, expires_at: expires, issued_at: issued}),
  });
  const status = document.getElementById('subStatus');
  status.textContent = resp.ok ? ` ✓ applied (expires ${expires})` : ` ✗ ${resp.status} ${await resp.text()}`;
}

// refreshTurnIndicator shows whether the issued iceServers include a TURN relay,
// making the subscription gate visible to the eye.
function refreshTurnIndicator(iceServers) {
  const hasTurn = (iceServers || []).some(s => {
    const urls = Array.isArray(s.urls) ? s.urls : [s.urls];
    return urls.some(u => /^turns?:/.test(String(u))); // turn: or turns: (TLS)
  });
  document.getElementById('turnIndicator').textContent =
    'iceServers contain TURN: ' + (hasTurn ? 'YES (subscriber)' : 'no (STUN only)');
}

// setupPairButton shows the "Pair this Mac" button iff the URL fragment carries
// a pair secret. Clicking it runs the first-pairing enrollment handshake.
function setupPairButton() {
  const p = pairing();
  const btn = document.getElementById('pairBtn');
  if (!p) { btn.style.display = 'none'; return; }
  btn.style.display = 'inline-block';
  btn.textContent = `Pair this Mac (${p.daemon.slice(0, 8)}…)`;
  btn.onclick = () => enroll(p);
}

// enroll runs the first-pairing handshake (carries the HMAC(S) proof). On
// success the Mac is saved to "my Macs" and the live session continues.
function enroll(p) {
  startRemoteSession({signal: p.signal, daemon: p.daemon, daemonPub: p.daemon, pair: p.pair, save: true});
}

// connectRemote reconnects to a saved Mac (no secret, key-only challenge).
function connectRemote(mac) {
  startRemoteSession({signal: mac.signal, daemon: mac.daemon, daemonPub: mac.daemonPub, pair: null, save: false, name: mac.name});
}

function surface() { return mode === 'rtc' ? vidEl : imgEl; }

function teardown() {
  startGen++; // invalidate any in-flight startRemoteSession awaiting ICE
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (ws) { ws.close(); ws = null; }
  if (sig) { try { sig.close(); } catch (e) {} sig = null; }
  if (dc) { try { dc.close(); } catch (e) {} dc = null; }
  if (pc) { try { pc.close(); } catch (e) {} pc = null; }
  imgEl.style.display = 'none';
  vidEl.style.display = 'none';
  vidEl.srcObject = null;
}

function showSurface() {
  surface().style.display = 'block';
  homeBtn.style.display = 'inline-block';
  hintEl.style.display = 'block';
}

modeRtcBtn.onclick = () => setMode('rtc');
modeJpgBtn.onclick = () => setMode('jpg');

function setMode(m) {
  if (m === mode) return;
  mode = m;
  currentUDID = null;
  modeRtcBtn.classList.toggle('active', m === 'rtc');
  modeJpgBtn.classList.toggle('active', m === 'jpg');
  teardown();
  enterMode();
}

// Each mode populates the simulator list its own way:
//   rtc → control plane comes up first, list arrives over the DataChannel
//   jpg → REST (Phase 1 fallback)
function enterMode() {
  simsEl.innerHTML = mode === 'rtc' ? 'pick or pair a Mac above' : 'loading…';
  if (mode === 'jpg') loadSimsREST();
}

function renderSims(sims) {
  simsEl.innerHTML = '';
  sims.forEach(s => {
    const b = document.createElement('button');
    b.textContent = `${s.state === 'Booted' ? '▶' : '○'} ${s.name} (${s.os_version})`;
    b.onclick = () => onPick(s);
    simsEl.appendChild(b);
  });
}

function onPick(s) {
  if (mode === 'rtc') pickRTC(s);
  else pickJPG(s);
}

// ---- RTC path: control plane + video on demand ----
// Signaling is pluggable: local mode talks to /rtc; remote mode pairs through
// the broker carried in the URL fragment (#signal&token&pubkey). The peer +
// control DataChannel and all downstream control-plane logic are identical.

// pairing() returns enrollment coordinates iff the URL fragment carries a pair
// secret: {signal, daemon, pair}. Reconnects use saved Macs instead.
function pairing() {
  const f = new URLSearchParams(location.hash.slice(1));
  const signal = f.get('signal'), daemon = f.get('daemon'), pair = f.get('pair');
  return (signal && daemon && pair) ? {signal, daemon, pair} : null;
}

let reconnectTimer = null;
let currentSession = null; // {signal, daemon, daemonPub, pair, save, name}

// startRemoteSession builds the peer + control DataChannel and runs the 3C
// handshake. On unexpected drop it auto-reconnects (reconnect path, no secret).
async function startRemoteSession(s) {
  teardown();
  currentSession = s;
  const gen = ++startGen;

  pc = new RTCPeerConnection();
  pc.addTransceiver('video', {direction: 'recvonly'});
  dc = pc.createDataChannel('control', {ordered: false, maxRetransmits: 0});
  pc.ontrack = (ev) => { vidEl.srcObject = ev.streams[0]; minimizeBuffer(pc); showSurface(); };
  dc.onopen = () => dc.send(JSON.stringify({type: 'list'}));
  dc.onmessage = (ev) => onCtrlReply(JSON.parse(ev.data));

  const onState = () => {
    if (!pc) return;
    if (pc.connectionState === 'failed') {
      // P2P could not be established (free tier has no relay) — retrying won't
      // add one, so surface the upsell instead of looping silently.
      showUpsell();
      teardown();
    } else if (pc.connectionState === 'disconnected') {
      scheduleReconnect(); // transient drop — try to recover (Mac may return)
    }
  };
  pc.onconnectionstatechange = onState;

  await signal3C(s, gen);
}

function scheduleReconnect() {
  if (reconnectTimer || !currentSession || currentSession.pair) return; // don't auto-retry an enrollment
  const s = currentSession;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    startRemoteSession({...s, pair: null, save: false}); // reconnect path
  }, 1000);
}

// signal3C: join → challenge(sign nonces) → proof → iceServers(offer) →
// verify signed answer. daemonPub authenticates the Mac (anti-MITM).
async function signal3C(s, gen) {
  sig = new WebSocket(s.signal);
  let offerSent = false;

  const sendJoin = async () => {
    const join = {type: 'join', role: 'client', daemon: s.daemon, pubkey: clientPub};
    if (s.pair) {
      const nonce = bytesToB64(crypto.getRandomValues(new Uint8Array(16)));
      join.nonce = nonce;
      join.pair = await enrollProof(s.pair, clientPub, nonce);
    }
    sig.send(JSON.stringify(join));
  };

  sig.onopen = sendJoin;
  sig.onmessage = async (ev) => {
    const m = JSON.parse(ev.data);
    if (gen !== startGen) return; // superseded
    switch (m.type) {
      case 'challenge': {
        const enc = new TextEncoder();
        const proof = {
          type: 'proof',
          sig: await signEd25519(enc.encode(m.nonce)),
          brokerSig: await signEd25519(enc.encode(m.brokerNonce)),
        };
        sig.send(JSON.stringify(proof));
        break;
      }
      case 'iceServers': {
        window._iceServers = m.iceServers || [];
        refreshTurnIndicator(window._iceServers); // defined in Task 18
        pc.setConfiguration({iceServers: window._iceServers});
        if (!offerSent) {
          const offer = await pc.createOffer();
          await pc.setLocalDescription(offer);
          await iceGatheringComplete(pc);
          if (gen !== startGen) return;
          sig.send(JSON.stringify({type: 'offer', sdp: pc.localDescription.sdp}));
          offerSent = true;
        }
        break;
      }
      case 'answer': {
        const ok = await verifyAnswer(s.daemonPub, m.sdp, m.sig);
        if (!ok) { showAuthFail(); teardown(); return; }
        await pc.setRemoteDescription({type: 'answer', sdp: m.sdp});
        minimizeBuffer(pc);
        if (s.save) {
          saveMac({signal: s.signal, daemon: s.daemon, daemonPub: s.daemonPub, name: s.name || 'Mac'});
          // Enrolled now: drop the one-time secret so an unexpected drop
          // auto-reconnects via the key-only path instead of being suppressed
          // by scheduleReconnect's "don't auto-retry an enrollment" guard.
          if (currentSession) currentSession.pair = null;
        }
        break;
      }
      case 'error':
        if (String(m.msg).includes('offline')) { scheduleReconnect(); }
        else { alert('pairing error: ' + m.msg); teardown(); }
        break;
      case 'peerLeft':
        scheduleReconnect();
        break;
    }
  };
  sig.onclose = () => { if (gen === startGen) scheduleReconnect(); };
}

// Local dev signaling: one /rtc WS, offer→answer, no auth (localhost).
async function signalLocal(gen) {
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await iceGatheringComplete(pc);
  if (gen !== startGen) return; // superseded

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  sig = new WebSocket(`${proto}://${location.host}/rtc`);
  sig.onopen = () => sig.send(JSON.stringify({type: 'offer', sdp: pc.localDescription.sdp}));
  sig.onmessage = async (ev) => {
    const m = JSON.parse(ev.data);
    if (m.type === 'answer') {
      await pc.setRemoteDescription({type: 'answer', sdp: m.sdp});
      minimizeBuffer(pc);
    } else if (m.type === 'error') {
      alert('rtc signaling error: ' + m.msg);
      teardown();
    }
  };
}

// verifyAnswer checks the daemon's Ed25519 signature over the answer SDP using
// WebCrypto. Returns false on any decode/verify failure.
async function verifyAnswer(pubB64, sdp, sigB64) {
  try {
    const pub = b64ToBytes(pubB64), sigBytes = b64ToBytes(sigB64);
    const key = await crypto.subtle.importKey('raw', pub, {name: 'Ed25519'}, false, ['verify']);
    return await crypto.subtle.verify('Ed25519', key, sigBytes, new TextEncoder().encode(sdp));
  } catch (e) {
    console.error('answer verification error', e);
    return false;
  }
}

function b64ToBytes(b64) {
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}

function showUpsell() {
  alert('Could not connect peer-to-peer.\n\n' +
        'Free tier has no relay (TURN) infrastructure — be on the same network ' +
        'as your Mac, or subscribe for connect-from-anywhere.');
}

function showAuthFail() {
  alert('Pairing authentication failed: the signaling answer was not signed by ' +
        'the expected device key. Possible man-in-the-middle — do not proceed. Re-pair.');
}

function onCtrlReply(m) {
  switch (m.type) {
    case 'sims':
      renderSims(m.sims || []);
      break;
    case 'booted':
      // simulator is up; attach — unless the user re-picked a different one
      if (m.udid !== currentUDID) break;
      dc.send(JSON.stringify({type: 'attach', udid: m.udid}));
      break;
    case 'attached':
      showSurface(); // currentUDID was set in pickRTC
      break;
    case 'detached':
      vidEl.style.display = 'none';
      break;
    case 'error':
      alert('rtc error: ' + m.msg);
      break;
  }
}

function pickRTC(s) {
  if (!dc || dc.readyState !== 'open') { alert('control channel not ready'); return; }
  currentUDID = s.udid;
  vidEl.style.display = 'none'; // hide until new feed arrives
  if (s.state !== 'Booted') {
    dc.send(JSON.stringify({type: 'boot', udid: s.udid})); // → booted → attach
  } else {
    dc.send(JSON.stringify({type: 'attach', udid: s.udid}));
  }
}

// ---- JPG path (Phase 1, unchanged transport) ----
async function loadSimsREST() {
  try {
    const r = await fetch('/api/simulators');
    renderSims(await r.json());
  } catch (e) {
    simsEl.innerHTML = 'failed to load simulators: ' + e;
  }
}

async function pickJPG(s) {
  if (s.state !== 'Booted') {
    const r = await fetch('/api/boot', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({udid: s.udid}),
    });
    if (!r.ok) { alert('boot failed: ' + (await r.text())); return; }
  }
  currentUDID = s.udid;
  teardown();
  startJPG(s.udid);
}

function startJPG(udid) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/session?udid=${encodeURIComponent(udid)}`);
  ws.binaryType = 'blob';
  ws.onmessage = (ev) => {
    if (typeof ev.data === 'string') { console.log('status', ev.data); return; }
    const url = URL.createObjectURL(ev.data);
    const old = imgEl.src;
    imgEl.src = url;
    showSurface();
    if (old) URL.revokeObjectURL(old);
  };
  ws.onclose = () => { console.log('ws closed'); };
}

// Minimize the receiver playout buffer for low latency (Chrome; try/catch for Safari).
function minimizeBuffer(pc) {
  pc.getReceivers().forEach(r => {
    try { r.jitterBufferTarget = 0; } catch (e) {}
    try { r.playoutDelayHint = 0; } catch (e) {}
  });
}

function iceGatheringComplete(pc) {
  if (pc.iceGatheringState === 'complete') return Promise.resolve();
  return new Promise(resolve => {
    const check = () => {
      if (pc.iceGatheringState === 'complete') {
        pc.removeEventListener('icegatheringstatechange', check);
        resolve();
      }
    };
    pc.addEventListener('icegatheringstatechange', check);
  });
}

// ---- Shared input ----
function sendControl(obj) {
  const s = JSON.stringify(obj);
  if (mode === 'rtc') {
    if (dc && dc.readyState === 'open') dc.send(s);
  } else {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(s);
  }
}

function controlReady() {
  return mode === 'rtc'
    ? (dc && dc.readyState === 'open' && currentUDID)
    : (ws && ws.readyState === WebSocket.OPEN);
}

function normCoords(e) {
  const rect = surface().getBoundingClientRect();
  const x = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
  const y = Math.min(1, Math.max(0, (e.clientY - rect.top) / rect.height));
  return {x, y};
}

const SWIPE_THRESHOLD_PX = 6;
let drag = null;

for (const el of [imgEl, vidEl]) {
  el.addEventListener('pointerdown', (e) => {
    if (e.button !== 0) return;
    const c = normCoords(e);
    drag = {x: c.x, y: c.y, clientX: e.clientX, clientY: e.clientY, t: Date.now()};
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointerup', (e) => {
    if (e.button !== 0 || !drag) return;
    if (!controlReady()) { drag = null; return; }
    const dx = e.clientX - drag.clientX;
    const dy = e.clientY - drag.clientY;
    if (Math.sqrt(dx * dx + dy * dy) < SWIPE_THRESHOLD_PX) {
      sendControl({type: 'tap', x: drag.x, y: drag.y});
    } else {
      const end = normCoords(e);
      const duration = Math.max(0.05, (Date.now() - drag.t) / 1000);
      sendControl({type: 'swipe', x1: drag.x, y1: drag.y, x2: end.x, y2: end.y, duration});
    }
    drag = null;
  });
  el.addEventListener('pointercancel', () => { drag = null; });
}

const MODIFIER_KEYS = new Set(['Shift', 'Control', 'Alt', 'Meta']);
window.addEventListener('keydown', (e) => {
  if (!controlReady()) return;
  if (MODIFIER_KEYS.has(e.key)) return;
  if (e.ctrlKey || e.metaKey) return;
  e.preventDefault();
  sendControl({type: 'key', key: e.key});
});

homeBtn.onclick = () => sendControl({type: 'home'});

(async function init() {
  await loadOrCreateIdentity();
  renderIdentity();
  renderMacs();
  setupStartPanel();          // app-secret input + Start drives pairing/reconnect
  setupSubscriptionPanel();   // defined in Task 18
  if (mode === 'jpg') loadSimsREST();
})();
</script>
